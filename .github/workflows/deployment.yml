name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev-master

jobs:
  build-and-deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      VITE_BASE_URL: ${{ secrets.VITE_BASE_URL_PROD }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_PROD }}
      VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN_PROD }}
      VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID_PROD }}
      VITE_STORAGEBUCKET: ${{ secrets.VITE_STORAGEBUCKET_PROD }}
      VITE_MESSAGE_SENDER_ID: ${{ secrets.VITE_MESSAGE_SENDER_ID_PROD }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID_PROD }}
      VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID_PROD }}
      VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY_PROD }}
      VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL_PROD }}
      VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID_PROD }}
      VITE_FACEBOOK_APP_ID: ${{ secrets.VITE_FACEBOOK_APP_ID_PROD }}
      VITE_FACEBOOK_CONFIG_ID: ${{ secrets.VITE_FACEBOOK_CONFIG_ID_PROD }}
      VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY_PROD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ secrets.AWS_REGION_PROD }}

      - name: Deploy to S3 (Production)
        run: |
          # Sync HTML files (no-cache)
          aws s3 sync dist/ s3://prod-pressq-front-end/ \
            --delete \
            --cache-control max-age=0,no-cache,no-store,must-revalidate \
            --content-type "text/html" \
            --exclude "*" \
            --include "*.html"

          # Sync all other files (immutable cache)
          aws s3 sync dist/ s3://prod-pressq-front-end/ \
            --delete \
            --cache-control max-age=31536000,public,immutable \
            --exclude "*.html"

      - name: Invalidate CloudFront cache (Production)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"
  build-and-deploy-dev-master:
    if: github.ref == 'refs/heads/dev-master'
    runs-on: ubuntu-latest

    env:
      VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN }}
      VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID }}
      VITE_STORAGEBUCKET: ${{ secrets.VITE_STORAGEBUCKET }}
      VITE_MESSAGE_SENDER_ID: ${{ secrets.VITE_MESSAGE_SENDER_ID }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
      VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID }}
      VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
      VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
      VITE_FACEBOOK_APP_ID: ${{ secrets.VITE_FACEBOOK_APP_ID }}
      VITE_FACEBOOK_CONFIG_ID: ${{ secrets.VITE_FACEBOOK_CONFIG_ID }}
      VITE_SHOPIFY_CLIENT_ID: ${{ secrets.VITE_SHOPIFY_CLIENT_ID }}
      VITE_SHOPIFY_REDIRECT_URI: ${{ secrets.VITE_SHOPIFY_REDIRECT_URI }}
      VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}
      VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3 (Development)
        run: |
          aws s3 sync dist/ s3://dev-pressq-front-end/ \
            --delete \
            --cache-control max-age=0,no-cache,no-store,must-revalidate \
            --content-type "text/html" \
            --exclude "*" \
            --include "*.html"

          aws s3 sync dist/ s3://dev-pressq-front-end/ \
            --delete \
            --cache-control max-age=31536000,public,immutable \
            --exclude "*.html"
      - name: Invalidate CloudFront cache (Development)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }} \
            --paths "/*"

